<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
{% include 'navbar.html' %}
<h1>Student Results</h1>

<table border="1">
    <tr>
        <th>Roll No</th>
        <th>Total</th>
        <th>Average</th>
        <th>Grade</th>
    </tr>

    {% for result in results %}
    <tr>
        <td>{{ result['rollno'] }}</td>
        <td>{{ result['total'] }}</td>
        <td>{{ result['average'] }}</td>
        <td>{{ result['grade'] }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
